<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBizAgent</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- ============ SIDEBAR ============ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#171717" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <span class="sidebar-brand">SuperBizAgent</span>
            </div>

            <div class="sidebar-actions">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    新建对话
                </button>
            </div>

            <div class="sidebar-nav">
                <button class="sidebar-btn" id="handbookSidebarBtn">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2"/></svg>
                    告警手册
                </button>
                <button class="sidebar-btn" id="searchDocsSidebarBtn">
                    <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    搜索知识库
                </button>
                <button class="sidebar-btn" id="exportChatBtn">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2"/><polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2"/></svg>
                    导出对话
                </button>
                <button class="sidebar-btn" id="clearChatSidebarBtn">
                    <svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2"/></svg>
                    清空对话
                </button>
            </div>

            <div class="sidebar-divider"></div>

            <div class="chat-history-section">
                <div class="chat-history-list" id="chatHistoryList"></div>
            </div>

            <div class="sidebar-footer">
                <button class="theme-toggle-btn" id="themeToggleBtn">
                    <svg id="themeIconLight" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2"/></svg>
                    <span id="themeLabel">暗色模式</span>
                </button>
            </div>
        </aside>

        <!-- ============ MAIN ============ -->
        <main class="main-content">
            <!-- Top bar -->
            <div class="top-bar">
                <button class="ai-ops-btn" id="aiOpsBtn">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    AI Ops
                </button>
            </div>

            <!-- Chat area -->
            <div class="chat-container centered" id="chatContainer">
                <div class="welcome-greeting" id="welcomeGreeting">
                    <div class="greeting-icon">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#171717" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <h2>有什么可以帮助你的？</h2>
                    <div class="quick-suggestions">
                        <span class="quick-suggestion-chip" data-prompt="查询当前活跃的Prometheus告警">🔔 查询活跃告警</span>
                        <span class="quick-suggestion-chip" data-prompt="帮我分析CPU使用率过高的问题">📊 分析CPU问题</span>
                        <span class="quick-suggestion-chip" data-prompt="搜索内部文档中的故障处理流程">📖 搜索内部文档</span>
                        <span class="quick-suggestion-chip" data-prompt="查看最近的系统日志">📋 查看系统日志</span>
                        <span class="quick-suggestion-chip" data-prompt="北京今天天气怎么样？">🌤️ 查询天气</span>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <!-- Input -->
                <div class="chat-input-container">
                    <div class="input-group-wrapper">
                        <div class="input-wrapper">
                            <input type="text" id="messageInput" placeholder="发送消息..." maxlength="2000" class="message-input" autofocus>
                            <div class="input-actions">
                                <div class="tools-btn-wrapper">
                                    <button class="tools-btn" id="toolsBtn" title="更多选项">
                                        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="6" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="18" r="1.5" fill="currentColor"/></svg>
                                    </button>
                                    <div class="tools-menu" id="toolsMenu">
                                        <div class="tools-menu-item" id="uploadFileItem">
                                            <svg viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                                            <span>上传文件到知识库</span>
                                        </div>
                                        <div class="tools-menu-item" id="searchDocsPopoverItem">
                                            <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                                            <span>搜索知识库</span>
                                        </div>
                                    </div>
                                </div>
                                <button class="send-btn-circle" id="sendButton" title="发送">
                                    <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9M22 2L2 9l9 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept=".txt,.md,.markdown" style="display:none;">
                </div>
            </div>
        </main>
    </div>

    <!-- ============ SEARCH POPOVER ============ -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-popover" id="searchPopover">
            <div class="search-popover-header">
                搜索知识库
                <button class="search-popover-close" id="searchPopoverClose">✕</button>
            </div>
            <div class="search-popover-input-wrap">
                <input type="text" class="search-popover-input" id="searchPopoverInput"
                       placeholder="输入关键词搜索内部文档...">
            </div>
            <div class="search-popover-results" id="searchPopoverResults">
                <div class="search-popover-empty">输入关键词开始搜索知识库</div>
            </div>
        </div>
    </div>

    <!-- ============ HANDBOOK PANEL ============ -->
    <div class="handbook-overlay" id="handbookOverlay"></div>
    <div class="handbook-panel" id="handbookPanel">
        <div class="handbook-panel-header">
            <h3>📋 公司告警手册</h3>
            <button class="handbook-close-btn" id="handbookCloseBtn">✕</button>
        </div>
        <div class="handbook-search">
            <input type="text" id="handbookSearchInput" placeholder="搜索告警...">
        </div>
        <div class="handbook-stats" id="handbookStats">
            <span class="handbook-stat-chip all active" data-filter="all">全部</span>
            <span class="handbook-stat-chip critical" data-filter="critical">严重</span>
            <span class="handbook-stat-chip warning" data-filter="warning">警告</span>
        </div>
        <div class="handbook-list" id="handbookList">
            <div style="text-align:center;padding:40px;color:#aaa;font-size:13px;">加载中...</div>
        </div>
    </div>

    <!-- ============ TOAST CONTAINER ============ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============ LOADING OVERLAY ============ -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">智能运维分析中...</div>
            <div class="loading-subtext">请耐心等待</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
